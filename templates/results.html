<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Recorded | E-Voting System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="center-layout animate-gradient">

    <div class="glass-container auth-box fade-in success-box">
        <div class="icon-pulse">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>
        
        <h2>Success!</h2>
        
        {% if message %}
        <p class="success-message">{{ message }}</p>
        {% else %}
        <p class="success-message">Your vote has been securely recorded on the distributed ledger.</p>
        {% endif %}
        
        <div class="action-buttons block">
            <a href="{{ url_for('logout') }}" class="primary-btn outline-variant">Return to Homepage</a>
            <a href="{{ url_for('dashboard') }}" class="secondary-btn">View Live Dashboard</a>
        </div>
    </div>

</body>
</html>
