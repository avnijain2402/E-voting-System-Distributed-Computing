<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Voting Token</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="center-layout animate-gradient">

    <div class="glass-container auth-box fade-in" style="text-align: center;">
        <div class="logo-area">
            <h1>Authentication Successful</h1>
            <p>Your secure voting token has been generated.</p>
        </div>

        <div style="background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 10px; margin: 2rem 0;">
            <p style="font-size: 1.1rem; margin-bottom: 0.5rem; color: #cbd5e1;">Your Single-Use Voting Token:</p>
            <h2 style="font-size: 2.5rem; letter-spacing: 4px; color: #38bdf8; margin: 0; font-family: monospace;">{{ token }}</h2>
        </div>
        
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem;">
            Please copy or remember this token. You will need it on the next page to cast your ballot.
        </p>

        <a href="{{ url_for('vote') }}" class="primary-btn" style="display: inline-block; text-decoration: none;">Proceed to Ballot</a>
    </div>

</body>
</html>
